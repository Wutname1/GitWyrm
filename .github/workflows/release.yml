name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+"

jobs:
  # Runs before any build work so a bad tag fails in seconds rather than after
  # two full matrix builds, and never publishes a release that the updater would
  # then refuse to offer.
  check-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Reject a tag that is not ahead of the latest release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          # Compare on the base version: 0.0.3-beta.1 must still beat a released
          # 0.0.2, and a later 0.0.3 stays legal after its own beta.
          base="${tag%%-beta.*}"

          # Drafts are excluded: a draft tag has not shipped and may be re-cut.
          published=$(gh release list --limit 100 --json tagName,isDraft \
            --jq '.[] | select(.isDraft | not) | .tagName')

          # Base versions of everything published, betas included, for the
          # "is this tag behind?" comparison.
          latest=$(printf '%s\n' "$published" | sed 's/-beta\..*$//' \
            | grep -v '^$' | sort -V | tail -n1 || true)

          if [ -z "$latest" ]; then
            echo "No published release yet; accepting $tag."
            exit 0
          fi

          echo "Tag: $tag (base $base) | latest published: $latest"

          # Exact-tag match only. Promoting 0.0.3 to stable after shipping
          # 0.0.3-beta.1 is the normal flow and must stay allowed.
          if printf '%s\n' "$published" | grep -qxF "$tag"; then
            echo "::error::$tag is already published. Bump the version."
            exit 1
          fi

          older=$(printf '%s\n%s\n' "$base" "$latest" | sort -V | head -n1)
          if [ "$base" != "$latest" ] && [ "$older" = "$base" ]; then
            echo "::error::$tag is behind the latest published release $latest. Clients on $latest would never be offered this build."
            exit 1
          fi

          echo "OK: $tag is ahead of $latest."

  release:
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            rust_target: x86_64-pc-windows-msvc
            tauri_args: ""
            bundle_base: src-tauri/target/release/bundle
            portable_suffix: ""
          - arch: aarch64
            rust_target: aarch64-pc-windows-msvc
            tauri_args: "--target aarch64-pc-windows-msvc"
            bundle_base: src-tauri/target/aarch64-pc-windows-msvc/release/bundle
            portable_suffix: "-arm64"
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7

      # A -beta.N tag ships as a GitHub prerelease. The updater reads
      # /releases/latest, which skips prereleases, so betas never get offered
      # to people on the stable channel.
      - name: Determine channel
        id: channel
        shell: bash
        run: |
          if [[ "${{ github.ref_name }}" == *"-beta."* ]]; then
            echo "is_beta=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_beta=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: ${{ matrix.arch }}

      # Asset filenames and the in-app version come from these manifests, not
      # from the tag. Without this the release for tag 1.2.3 ships files named
      # after whatever version happens to be committed.
      - name: Sync version to tag
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          Write-Host "Setting version to $version"

          $conf = Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $conf.version = $version
          $conf | ConvertTo-Json -Depth 100 | Set-Content src-tauri/tauri.conf.json

          # Only the first version= line, which is the [package] one. The
          # dependency versions further down must not be touched.
          $cargo = Get-Content src-tauri/Cargo.toml
          $done = $false
          $cargo = $cargo | ForEach-Object {
            if (-not $done -and $_ -match '^version\s*=') {
              $done = $true
              "version = `"$version`""
            } else {
              $_
            }
          }
          $cargo | Set-Content src-tauri/Cargo.toml

          # Cargo.lock records the package's own version too. Left stale it
          # contradicts Cargo.toml, which fails any --locked/--frozen build.
          # Rewritten in place rather than via `cargo update`, which needs the
          # registry index and so cannot run before dependencies are fetched.
          $lock = Get-Content src-tauri/Cargo.lock -Raw
          $pattern = '(?m)^(name = "gitwyrm"\r?\nversion = )"[^"]*"'
          if ($lock -notmatch $pattern) { throw "gitwyrm package entry not found in Cargo.lock" }
          $lock = [regex]::Replace($lock, $pattern, "`$1`"$version`"")
          Set-Content src-tauri/Cargo.lock -Value $lock -NoNewline

          npm version $version --no-git-tag-version --allow-same-version

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release (NSIS + updater manifest)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Lets the Sentry vite plugin upload JS source maps during the frontend
          # build (gitwyrm-frontend project). Absent token = upload silently skipped.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "GitWyrm ${{ github.ref_name }}"
          # Placeholder only. The publish job overwrites this body with the
          # generated changelog before the release goes public, so whatever a
          # matrix leg writes here is never what users end up reading.
          releaseBody: "Release notes are generated when this release is published."
          # Stays a draft here on purpose: both matrix legs share one release,
          # and publishing from a leg would make it public before the other
          # arch's installer is attached. The publish job below flips it once
          # every leg has succeeded.
          releaseDraft: true
          prerelease: ${{ steps.channel.outputs.is_beta }}
          args: ${{ matrix.tauri_args }}

      # Upload the backend debug symbols to Sentry (gitwyrm-backend project) so
      # Rust panics get readable stack traces. During alpha we ship the binary
      # unstripped (Cargo `strip = false`) so every build -- installer, portable,
      # and CDN copy -- symbolicates consistently. Revisit stripping for size at
      # beta, when it'd have to happen before the NSIS bundle is signed.
      - name: Upload Rust debug symbols to Sentry
        shell: pwsh
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: gitwyrm
          SENTRY_PROJECT: gitwyrm-backend
        run: |
          # Point at the release dir so the upload grabs both the exe and its
          # .pdb -- the PDB is what gives line numbers, not just function names.
          # The x86_64 leg builds with no --target flag, so it lands in the plain
          # target/release; the aarch64 leg uses a target-specific dir. Match how
          # the portable-exe step below picks its path.
          $dir = "src-tauri/target/${{ matrix.rust_target }}/release"
          if (-not (Test-Path "$dir/gitwyrm.exe")) {
            $dir = "src-tauri/target/release"
          }
          npx @sentry/cli debug-files upload --include-sources "$dir"

      - name: Attach portable exe
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Copy-Item src-tauri/target/${{ matrix.rust_target }}/release/gitwyrm.exe gitwyrm-portable${{ matrix.portable_suffix }}.exe -ErrorAction SilentlyContinue
          if (-not (Test-Path gitwyrm-portable${{ matrix.portable_suffix }}.exe)) {
            Copy-Item src-tauri/target/release/gitwyrm.exe gitwyrm-portable${{ matrix.portable_suffix }}.exe
          }
          gh release upload ${{ github.ref_name }} gitwyrm-portable${{ matrix.portable_suffix }}.exe --clobber

      # Republishes the just-built NSIS installer to a stable per-arch filename at the CDN root so
      # the bootstrapper (see .github/workflows/bootstrapper.yml) and the README download links
      # always fetch the newest build without the URL ever changing.
      - name: Upload installer to CDN latest path
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        run: |
          set -euo pipefail
          pip install awscli
          NSIS_EXE=$(find "${{ matrix.bundle_base }}/nsis" -name "*.exe" -type f | head -1)
          if [ -z "$NSIS_EXE" ]; then
            echo "::error::No NSIS installer found under ${{ matrix.bundle_base }}/nsis"
            exit 1
          fi
          echo "Publishing $NSIS_EXE"
          SUFFIX=""
          if [ "${{ matrix.arch }}" = "aarch64" ]; then
            SUFFIX="-ARM64"
          fi
          # The "latest installer" path the bootstrapper downloads from. This must
          # stay under installers/ and never at the bucket root: the root holds
          # GitWyrm-Setup.exe, which is the bootstrapper itself and the single URL
          # the website's download button has always pointed at. Publishing the raw
          # NSIS installer over it replaces the bootstrapper, and the browser-trust
          # reputation built up on that unchanging filename is lost with it.
          # Betas must never land here either, or everyone gets a prerelease.
          if [ "${{ steps.channel.outputs.is_beta }}" = "true" ]; then
            echo "Beta build - leaving the latest installer path untouched"
          else
            aws s3 cp "$NSIS_EXE" \
              "s3://gitwyrm-cdn/installers/latest/GitWyrm-Setup${SUFFIX}.exe" \
              --endpoint-url "$R2_ENDPOINT" \
              --cache-control "no-cache, no-store"
          fi
          # Immutable per-version copy, so a specific build stays fetchable after
          # the latest path moves on. Useful for pinned corporate deployments.
          aws s3 cp "$NSIS_EXE" \
            "s3://gitwyrm-cdn/releases/${{ github.ref_name }}/GitWyrm-Setup${SUFFIX}.exe" \
            --endpoint-url "$R2_ENDPOINT" \
            --cache-control "public, max-age=31536000, immutable"

  # Both build legs share one release, so publishing is a separate job that runs
  # only after every arch has finished and attached its assets. The updater
  # endpoint resolves /releases/latest, which ignores drafts - so the release is
  # not live to users, and updates are not offered, until this job runs.
  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Full history + tags: the changelog range is prev-tag..this-tag, which a
      # shallow clone cannot resolve.
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          assets=$(gh release view "$TAG" --json assets --jq '.assets[].name')
          echo "Assets on $TAG:"
          echo "$assets" | sed 's/^/  /'

          # Refuse to publish a half-built release. latest.json is what the
          # in-app updater reads; without it clients silently stop updating.
          missing=0
          for required in latest.json x64-setup.exe arm64-setup.exe; do
            if ! echo "$assets" | grep -q -- "$required"; then
              echo "::error::Missing required asset matching '$required'"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      # tauri-action points the manifest at api.github.com asset URLs, which serve
      # JSON metadata rather than the installer to an unauthenticated client. The
      # updater then feeds that JSON to NSIS, which uninstalls the current version
      # and leaves nothing runnable (shipped as 0.0.3). Rewritten here, before the
      # release goes live, so the manifest is correct the moment anyone can read it.
      # Verification has to wait until after publishing -- a draft's assets 404 on
      # the public download path -- so it runs as its own step further down.
      - name: Point updater manifest at public download URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          chmod +x .github/scripts/*.sh
          .github/scripts/resolve-updater-urls.sh rewrite "${{ github.ref_name }}"

      # Publish the structured changelog to gitwyrm.com and render the same
      # items to CHANGELOG.md. Without CHANGELOG_API_KEY the upload is skipped
      # and only the render below runs, so the GitHub Release still gets notes.
      - name: Publish changelog to gitwyrm.com
        env:
          CHANGELOG_API_KEY: ${{ secrets.CHANGELOG_API_KEY }}
          CHANGELOG_API_URL: https://gitwyrm.com/api/v1/changelogs
          PRODUCT: GitWyrm
          RELEASE_VERSION: ${{ github.ref_name }}
          DOWNLOAD_URL: https://cdn.gitwyrm.com/releases/${{ github.ref_name }}/GitWyrm-Setup.exe
        run: |
          chmod +x .github/scripts/*.sh
          .github/scripts/upload-changelog.sh

      # Build the release body: generated notes on top, download guidance below.
      # render-changelog.sh regenerates from the same commit range, so the body
      # matches what the website received even when the upload was skipped.
      - name: Build release body
        env:
          PRODUCT: GitWyrm
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/*.sh
          .github/scripts/render-changelog.sh CHANGELOG.md >/dev/null

          {
            if [ -s CHANGELOG.md ]; then
              cat CHANGELOG.md
            else
              echo "Maintenance release - no user-facing changes."
              echo
            fi
            cat <<'EOF'
          ---

          ## Download

          **Most people want [GitWyrm-Setup.exe](https://cdn.gitwyrm.com/GitWyrm-Setup.exe)** - it always
          installs the newest version and keeps itself up to date.

          The installers attached below are pinned to this specific version. `gitwyrm-portable.exe`
          needs no install but does not auto-update.

          Deploying across a company? See the
          [enterprise deployment guide](https://docs.gitwyrm.com/guide/enterprise-deployment).

          See every release on the [changelog](https://gitwyrm.com/changelog).
          EOF
          } > RELEASE_BODY.md

          cat RELEASE_BODY.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release edit "$TAG" --notes-file RELEASE_BODY.md --draft=false
          echo "Published $TAG"

      # The public download path only serves a published release, so this is the
      # first moment the manifest's URLs can actually be checked. If any of them
      # does not return a plausible installer the release goes back to draft --
      # better a missing release than one that bricks every client that updates.
      - name: Verify updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          chmod +x .github/scripts/*.sh
          if ! .github/scripts/resolve-updater-urls.sh verify "$TAG"; then
            echo "::error::Reverting $TAG to draft; its updater manifest is unusable."
            gh release edit "$TAG" --draft=true
            exit 1
          fi
